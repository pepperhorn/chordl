<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>chordl — Interactive Piano Chord Visualization</title>
    <meta name="description" content="Visualize any piano chord instantly. Type a chord name like Cmaj7, Dm7, or G7#9 and see the keyboard diagram, staff notation, fingering, and voicing variants. Free tool by Creative Ranges Foundation." />
    <meta name="keywords" content="piano chords, chord visualization, chord diagram, piano keyboard, music theory, jazz voicings, chord inversions, fingering, staff notation, MIDI" />
    <meta name="author" content="PepperHorn Music / Creative Ranges Foundation" />
    <link rel="canonical" href="https://chordl.app" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="chordl — Interactive Piano Chord Visualization" />
    <meta property="og:description" content="Type any chord and see it on the piano. Keyboard diagrams, staff notation, fingering, voicing variants, and MIDI export. Free and open source." />
    <meta property="og:url" content="https://chordl.app" />
    <meta property="og:site_name" content="chordl" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="chordl — Interactive Piano Chord Visualization" />
    <meta name="twitter:description" content="Type any chord and see it on the piano. Keyboard diagrams, staff notation, fingering, and voicing variants." />

    <!-- AEO: structured data for answer engines -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "chordl",
      "url": "https://chordl.app",
      "description": "Interactive piano chord visualization tool. Type any chord name — from simple triads to complex jazz voicings like Cmaj7#5, Dm7b5, or G7#9 — and instantly see keyboard diagrams, staff notation, fingering, hand assignments, and multiple voicing variants.",
      "applicationCategory": "MusicApplication",
      "operatingSystem": "Any",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "featureList": [
        "Piano keyboard chord diagrams",
        "Staff notation (treble, bass, grand staff)",
        "Auto-fingering with Levine-style hand splitting",
        "Multiple voicing variants (A/B/C toggle)",
        "Jazz voicing library (rootless, shell, quartal, drop 2, upper structure)",
        "Chord inversions",
        "MIDI note names",
        "SVG and PNG export",
        "MIDI file export",
        "Chord progression visualization (ii-V-I, blues, etc.)",
        "Dark mode",
        "Natural language input"
      ],
      "creator": {
        "@type": "Organization",
        "name": "Creative Ranges Foundation",
        "url": "https://creativeranges.org"
      },
      "publisher": {
        "@type": "Organization",
        "name": "PepperHorn Music",
        "url": "https://pepperhorn.com"
      },
      "license": "https://opensource.org/licenses/MIT"
    }
    </script>

    <!-- AEO: FAQ for answer engines -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "How do I visualize a piano chord?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Type any chord name into chordl — like Cmaj7, Dm7, G7#9, or Bbm7b5 — and it instantly shows a piano keyboard diagram with the notes highlighted. You can also add 'with fingering' to see finger numbers, or 'midi' for MIDI note names."
          }
        },
        {
          "@type": "Question",
          "name": "What chord formats does chordl support?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "chordl understands standard chord symbols (Cmaj7, Dm7, G7), slash chords (C/E), natural language (D minor seventh in first inversion), jazz voicing styles (Dm7 Bill Evans style), and progressions (ii-V-I in C). It supports triads, 7th chords, extended chords (9th, 11th, 13th), altered chords (#5, #9, b13), sus chords, and diminished chords."
          }
        },
        {
          "@type": "Question",
          "name": "Can I see different voicings for the same chord?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes — chordl generates multiple voicing variants for every chord. Use the A/B/C toggle below the keyboard to switch between root position, inversions, shell voicings, rootless voicings, and more. Press the + button to generate additional options."
          }
        },
        {
          "@type": "Question",
          "name": "Does chordl show piano fingering?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Add 'with fingering' to any chord and chordl assigns finger numbers (1-5) for each note. For chords too wide for one hand, it automatically splits between left and right hands using jazz piano principles inspired by Mark Levine's Jazz Piano Book."
          }
        }
      ]
    }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg: #f8f9fc;
        --bg-mesh-1: rgba(200, 220, 250, 0.3);
        --bg-mesh-2: rgba(240, 220, 210, 0.2);
        --bg-mesh-3: rgba(210, 240, 220, 0.15);
        --glass-bg: rgba(255, 255, 255, 0.72);
        --glass-border: rgba(255, 255, 255, 0.85);
        --glass-shadow: rgba(0, 0, 0, 0.03);
        --text: #1a1a2e;
        --text-muted: #5a6374;
        --text-dim: #8b95a5;
        --accent: #2d6cb5;
        --accent-soft: rgba(45, 108, 181, 0.07);
        --input-bg: rgba(255, 255, 255, 0.85);
        --input-border: rgba(45, 108, 181, 0.15);
        --input-focus: rgba(45, 108, 181, 0.3);
        --input-floating-bg: #fff;
        --input-floating-border: rgba(0, 0, 0, 0.08);
        --input-floating-shadow: 0 4px 24px rgba(0, 0, 0, 0.08), 0 1px 3px rgba(0, 0, 0, 0.06);
        --input-floating-shadow-focus: 0 4px 24px rgba(0, 0, 0, 0.12), 0 1px 3px rgba(0, 0, 0, 0.06), 0 0 0 3px var(--accent-soft);
        --pill-bg: rgba(0, 0, 0, 0.03);
        --pill-active-bg: #fff;
        --pill-active-shadow: rgba(0, 0, 0, 0.06);
        --pill-text: #3d4554;
        --pill-active-text: #1a1a2e;
        --tag-bg: rgba(45, 108, 181, 0.08);
        --tag-text: #2d6cb5;
        --error: #dc4545;
        --collapsible-arrow: #9ca3af;
        --btn-border: rgba(0, 0, 0, 0.08);
      }

      [data-bc-theme="dark"] {
        --bg: #0f1219;
        --bg-mesh-1: rgba(30, 60, 120, 0.25);
        --bg-mesh-2: rgba(50, 30, 70, 0.15);
        --bg-mesh-3: rgba(20, 55, 55, 0.12);
        --glass-bg: rgba(22, 27, 42, 0.65);
        --glass-border: rgba(255, 255, 255, 0.06);
        --glass-shadow: rgba(0, 0, 0, 0.35);
        --text: #e4e6ee;
        --text-muted: #8892a4;
        --text-dim: #555e70;
        --accent: #6ea8e6;
        --accent-soft: rgba(110, 168, 230, 0.1);
        --input-bg: rgba(20, 26, 42, 0.7);
        --input-border: rgba(110, 168, 230, 0.18);
        --input-focus: rgba(110, 168, 230, 0.35);
        --input-floating-bg: rgba(16, 20, 32, 0.92);
        --input-floating-border: rgba(255, 255, 255, 0.07);
        --input-floating-shadow: 0 4px 32px rgba(0, 0, 0, 0.4), 0 1px 4px rgba(0, 0, 0, 0.25);
        --input-floating-shadow-focus: 0 4px 32px rgba(0, 0, 0, 0.45), 0 1px 4px rgba(0, 0, 0, 0.25), 0 0 0 3px var(--accent-soft);
        --pill-bg: rgba(255, 255, 255, 0.06);
        --pill-active-bg: rgba(35, 40, 55, 0.95);
        --pill-active-shadow: rgba(0, 0, 0, 0.35);
        --pill-text: #9aa2b4;
        --pill-active-text: #e4e6ee;
        --tag-bg: rgba(110, 168, 230, 0.12);
        --tag-text: #6ea8e6;
        --error: #f87171;
        --collapsible-arrow: #555e70;
        --btn-border: rgba(255, 255, 255, 0.1);
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        transition: background 0.4s ease, color 0.4s ease;
        -webkit-font-smoothing: antialiased;
      }

      /* Mesh gradient background */
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background:
          radial-gradient(ellipse 60% 50% at 20% 20%, var(--bg-mesh-1), transparent),
          radial-gradient(ellipse 50% 60% at 80% 30%, var(--bg-mesh-2), transparent),
          radial-gradient(ellipse 40% 40% at 50% 80%, var(--bg-mesh-3), transparent);
        pointer-events: none;
        z-index: 0;
        transition: background 0.4s ease;
      }

      #root {
        position: relative;
        z-index: 1;
      }

      /* Glass card */
      .glass-card {
        background: var(--glass-bg);
        backdrop-filter: blur(24px) saturate(1.4);
        -webkit-backdrop-filter: blur(24px) saturate(1.4);
        border: 1px solid var(--glass-border);
        border-radius: 16px;
        box-shadow: 0 2px 20px var(--glass-shadow), 0 0 0 0.5px var(--glass-border);
        padding: 1.25rem 1.5rem;
        transition: background 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
      }

      /* Pill segmented control */
      .pill-group {
        display: inline-flex;
        background: var(--pill-bg);
        border-radius: 10px;
        padding: 3px;
        gap: 2px;
      }

      .pill-btn {
        font-family: 'DM Sans', system-ui, sans-serif;
        font-size: 0.8rem;
        font-weight: 500;
        padding: 6px 14px;
        border: none;
        border-radius: 8px;
        background: transparent;
        color: var(--pill-text);
        cursor: pointer;
        transition: all 0.2s ease;
        white-space: nowrap;
        letter-spacing: 0.01em;
      }

      .pill-btn:hover {
        color: var(--pill-active-text);
      }

      .pill-btn[data-active="true"] {
        background: var(--pill-active-bg);
        color: var(--pill-active-text);
        box-shadow: 0 1px 4px var(--pill-active-shadow);
        font-weight: 600;
      }

      /* Collapsible sections */
      .collapsible-header {
        display: flex;
        align-items: center;
        gap: 8px;
        cursor: pointer;
        user-select: none;
        font-size: 1rem;
        font-weight: 600;
        color: var(--text);
        padding: 0.5rem 0;
        letter-spacing: -0.01em;
      }

      .collapsible-header:hover {
        color: var(--accent);
      }

      .collapsible-arrow {
        display: inline-block;
        font-size: 0.65em;
        color: var(--collapsible-arrow);
        transition: transform 0.25s ease;
      }

      .collapsible-body {
        overflow: hidden;
        transition: max-height 0.35s ease, opacity 0.3s ease;
      }

      /* Example cards inside collapsibles */
      .example-label {
        display: block;
        font-size: 0.78rem;
        font-family: 'DM Sans', monospace;
        color: var(--text-dim);
        margin-bottom: 0.5rem;
        letter-spacing: 0.02em;
      }

      .row {
        display: flex;
        gap: 1rem;
        flex-wrap: wrap;
      }

      .row > .glass-card {
        flex: 1 1 0;
        min-width: 220px;
      }

      /* Control items: fixed label row + flexible centered content row */
      .control-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
      }

      .control-label {
        font-size: 0.7rem;
        color: var(--text-dim);
        letter-spacing: 0.04em;
        text-transform: uppercase;
        font-weight: 500;
        line-height: 1;
      }

      .control-content {
        flex: 1;
        display: flex;
        align-items: center;
      }

      /* Chord output area */
      .chord-output {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 1rem;
        margin-top: 1rem;
      }

      /* Fade-in animation */
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .fade-in {
        animation: fadeUp 0.5s ease both;
      }

      .fade-in-delay-1 { animation-delay: 0.1s; }
      .fade-in-delay-2 { animation-delay: 0.2s; }
      .fade-in-delay-3 { animation-delay: 0.3s; }

      /* Hint rotator — slide-fade */
      .hint-rotator {
        position: relative;
        height: 1.4em;
        overflow: hidden;
        width: 100%;
        text-align: center;
      }

      .hint-rotator__text {
        position: absolute;
        inset: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 0.84rem;
        font-weight: 400;
        color: var(--text-muted);
        letter-spacing: 0.005em;
        white-space: nowrap;
        opacity: 0;
        transform: translateY(8px);
        transition: opacity var(--hint-speed, 0.45s) ease, transform var(--hint-speed, 0.45s) ease;
      }

      .hint-rotator__text--active {
        opacity: 1;
        transform: translateY(0);
      }

      .hint-rotator__text--exit {
        opacity: 0;
        transform: translateY(-8px);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./App.tsx"></script>
  </body>
</html>
